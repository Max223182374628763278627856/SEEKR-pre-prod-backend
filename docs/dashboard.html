<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEEKR — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#0d0d18;--border:rgba(212,175,55,0.12);
  --gold:#D4AF37;--gold-dim:rgba(212,175,55,0.12);--gold-mid:rgba(212,175,55,0.35);
  --text:#e8e0c8;--text-muted:rgba(232,224,200,0.45);--text-dim:rgba(232,224,200,0.25);
  --green:#4ade80;--red:#f87171;--blue:#7dd3fc;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;width:100%;background:var(--bg);
}
.login-box{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:48px 40px;width:100%;max-width:400px;
}
.login-logo{font-size:22px;font-weight:900;letter-spacing:0.12em;color:var(--gold);margin-bottom:6px}
.login-logo span{color:var(--text)}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:32px}
.form-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;display:block}
.form-input{
  width:100%;padding:11px 14px;background:#060610;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;
  margin-bottom:16px;outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--gold-mid)}
.btn-login{
  width:100%;padding:13px;background:var(--gold);color:#0d0d12;font-weight:700;
  font-size:13px;border-radius:8px;cursor:pointer;border:none;letter-spacing:0.05em;
}
.login-error{
  background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);
  border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:16px;display:none;
}

/* ── LAYOUT ── */
#app{display:flex;width:100%;min-height:100vh;display:none}
.sidebar{
  width:230px;background:var(--surface);border-right:1px solid var(--border);
  padding:24px 0;flex-shrink:0;display:flex;flex-direction:column;position:fixed;
  top:0;left:0;bottom:0;overflow-y:auto;z-index:50;
}
.sidebar-logo{padding:0 24px 24px;font-size:20px;font-weight:900;letter-spacing:0.12em;color:var(--gold);border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-logo span{color:var(--text)}
.sidebar-section{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);padding:16px 24px 6px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 24px;font-size:13px;
  color:var(--text-muted);cursor:pointer;transition:all .15s;border-left:2px solid transparent;
}
.nav-item:hover{color:var(--text);background:var(--gold-dim)}
.nav-item.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold);font-weight:600}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sidebar-footer{margin-top:auto;padding:16px 24px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-mid);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--text)}
.user-plan{font-size:10px;color:var(--text-muted);text-transform:capitalize}
.btn-logout{margin-top:10px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-muted);font-size:11px;cursor:pointer;transition:all .15s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

.main{flex:1;margin-left:230px;padding:40px 48px;overflow-y:auto}

/* ── SITE SELECTOR ── */
.site-selector-bar{
  display:flex;align-items:center;gap:12px;margin-bottom:36px;
  padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;
}
.site-selector-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted)}
.site-select{
  background:#060610;border:1px solid var(--border);border-radius:7px;color:var(--text);
  font-size:13px;padding:7px 12px;cursor:pointer;outline:none;font-family:'Inter',sans-serif;
}
.btn-crawl{
  margin-left:auto;padding:8px 16px;background:var(--gold-dim);border:1px solid var(--gold-mid);
  border-radius:7px;font-size:12px;font-weight:600;color:var(--gold);cursor:pointer;
}

/* ── PAGE HEADER ── */
.page-tag{display:inline-block;background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:6px;margin-bottom:12px}
.page-title{font-size:24px;font-weight:800;color:#f0eacc;margin-bottom:6px}
.page-sub{font-size:13px;color:var(--text-muted);margin-bottom:32px}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px}
.stat-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.stat-val{font-size:28px;font-weight:800;color:#f0eacc}
.stat-delta{font-size:11px;margin-top:4px}
.stat-delta.up{color:var(--green)}.stat-delta.down{color:var(--red)}.stat-delta.neu{color:var(--text-muted)}

/* ── TABLE ── */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.section-head-title{font-size:13px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);padding:10px 20px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:13px 20px;font-size:13px;color:var(--text);border-bottom:1px solid rgba(212,175,55,0.05)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gold-dim)}

/* ── SCORE BADGE ── */
.score-badge{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;font-size:13px;font-weight:800}
.score-badge.good{background:rgba(74,222,128,0.12);color:var(--green)}
.score-badge.mid{background:rgba(251,191,36,0.12);color:#fbbf24}
.score-badge.bad{background:rgba(248,113,113,0.12);color:var(--red)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.ok{background:var(--green)}.status-dot.warn{background:#fbbf24}.status-dot.err{background:var(--red)}

/* ── BADGE ── */
.badge{display:inline-block;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.badge.green{background:rgba(74,222,128,0.1);color:var(--green)}
.badge.gold{background:var(--gold-dim);color:var(--gold)}
.badge.red{background:rgba(248,113,113,0.1);color:var(--red)}
.badge.blue{background:rgba(125,211,252,0.1);color:var(--blue)}

/* ── CODE BLOCK ── */
.code-block{background:#060610;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--gold-dim);border-bottom:1px solid var(--border)}
.code-lang{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em}
.copy-btn{font-size:11px;font-weight:600;color:var(--gold);cursor:pointer;background:none;border:none;padding:0}
.code-body{padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.75;overflow-x:auto}
.c-comment{color:var(--text-dim)}.c-tag{color:var(--blue)}.c-attr{color:#86efac}.c-string{color:var(--gold)}.c-hl{background:rgba(212,175,55,0.1);border-radius:3px;padding:0 2px}

/* ── CONFIG GRID ── */
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px}
.config-card-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px}
.config-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(212,175,55,0.06)}
.config-row:last-child{border-bottom:none}
.config-key{font-size:12px;color:var(--text-muted)}
.config-val{font-size:12px;color:var(--text);font-family:'JetBrains Mono',monospace}
.toggle{width:36px;height:20px;background:rgba(232,224,200,0.1);border-radius:10px;cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}

/* ── SUGGESTION CARD ── */
.sug-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:16px}
.sug-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:5px;margin-bottom:10px}
.sug-tag.eeat{background:rgba(125,211,252,0.1);color:var(--blue)}
.sug-tag.content{background:var(--gold-dim);color:var(--gold)}
.sug-tag.mystery{background:rgba(167,139,250,0.1);color:#a78bfa}
.sug-tag.struct{background:rgba(74,222,128,0.1);color:var(--green)}
.sug-title{font-size:14px;font-weight:700;color:#f0eacc;margin-bottom:6px}
.sug-body{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:14px}
.sug-actions{display:flex;gap:8px}
.sug-btn{padding:7px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none}
.sug-btn.apply{background:var(--gold);color:#0d0d12}
.sug-btn.regen{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-mid)}
.sug-btn.skip{background:transparent;color:var(--text-muted);border:1px solid var(--border)}

/* ── COMING SOON ── */
.coming-soon{text-align:center;padding:60px 40px;color:var(--text-muted)}
.coming-soon-icon{font-size:40px;margin-bottom:16px}
.coming-soon-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
.coming-soon-desc{font-size:13px;line-height:1.6;max-width:340px;margin:0 auto}

/* ── ANALYTICS ── */
.analytics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.profile-donut{display:flex;gap:24px;align-items:center;padding:24px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── KPI BAR ── */
.bar-wrap{background:rgba(232,224,200,0.06);border-radius:4px;height:6px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--gold)}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-muted);font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY STATE ── */
.empty{padding:40px;text-align:center;color:var(--text-muted);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">SEEKR<span>.</span></div>
    <div class="login-sub">Accès à votre espace client</div>
    <div class="login-error" id="login-error"></div>
    <label class="form-label">Email</label>
    <input class="form-input" id="login-email" type="email" placeholder="vous@exemple.fr" autocomplete="email">
    <label class="form-label">Mot de passe</label>
    <input class="form-input" id="login-password" type="password" placeholder="••••••••••" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">SE CONNECTER</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">SEEKR<span>.</span></div>

    <div class="sidebar-section">Vue générale</div>
    <div class="nav-item active" onclick="nav('overview')"><span class="nav-icon">◈</span>Overview</div>
    <div class="nav-item" onclick="nav('sites')"><span class="nav-icon">⬡</span>Mes sites</div>

    <div class="sidebar-section">SEO & Contenu</div>
    <div class="nav-item" onclick="nav('audit')"><span class="nav-icon">◎</span>Audit SEO</div>
    <div class="nav-item" onclick="nav('mystery')"><span class="nav-icon">✦</span>Mots mystères</div>
    <div class="nav-item" onclick="nav('suggestions')"><span class="nav-icon">✧</span>Suggestions IA</div>

    <div class="sidebar-section">Agent IA</div>
    <div class="nav-item" onclick="nav('analytics')"><span class="nav-icon">◉</span>Analytics Agent</div>
    <div class="nav-item" onclick="nav('pages')"><span class="nav-icon">☰</span>Pages indexées</div>

    <div class="sidebar-section">Paramètres</div>
    <div class="nav-item" onclick="nav('config')"><span class="nav-icon">⚙</span>Configuration</div>
    <div class="nav-item" onclick="nav('snippet')"><span class="nav-icon">&lt;/&gt;</span>Snippet & Install</div>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-plan" id="user-plan">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Se déconnecter</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-content">
    <div class="loading"><div class="spinner"></div> Chargement…</div>
  </div>

</div>

<script>
const API = 'https://api.seekr-search.fr';
let token = localStorage.getItem('seekr_token');
let currentUser = null;
let sites = [];
let selectedSiteId = null;
let sitePages = [];
let siteAnalytics = null;
let currentSection = 'overview';

// ── AUTH ──────────────────────────────────────────────────────────────────────

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pw })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Email ou mot de passe incorrect.'; err.style.display = 'block'; return; }
    token = d.token;
    localStorage.setItem('seekr_token', token);
    startApp();
  } catch(e) {
    err.textContent = 'Erreur réseau. Vérifiez votre connexion.';
    err.style.display = 'block';
  }
}

document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function logout() {
  localStorage.removeItem('seekr_token');
  location.reload();
}

async function fetchAPI(path, opts = {}) {
  const r = await fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (r.status === 401) { logout(); return null; }
  return r.json();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

async function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  const me = await fetchAPI('/api/me');
  if (!me) return;
  currentUser = me;

  document.getElementById('user-name').textContent = me.email?.split('@')[0] || me.email;
  document.getElementById('user-plan').textContent = me.plan || 'starter';
  document.getElementById('user-avatar').textContent = (me.email?.[0] || '?').toUpperCase();

  const sitesData = await fetchAPI('/api/sites');
  sites = sitesData?.sites || sitesData || [];

  if (sites.length > 0) {
    selectedSiteId = sites[0].id;
    await loadSiteData(selectedSiteId);
  }

  nav('overview');
}

async function loadSiteData(siteId) {
  if (!siteId) return;
  const [pages, analytics] = await Promise.all([
    fetchAPI(`/api/pages/${siteId}`),
    fetchAPI(`/api/analytics/${siteId}`)
  ]);
  sitePages = pages?.pages || pages || [];
  siteAnalytics = analytics;
}

async function changeSite(siteId) {
  selectedSiteId = siteId;
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div> Chargement…</div>';
  await loadSiteData(siteId);
  nav(currentSection);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────

function nav(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick') === `nav('${section}')`) el.classList.add('active');
  });
  const main = document.getElementById('main-content');

  const site = sites.find(s => s.id === selectedSiteId);
  const siteSelector = sites.length > 0 ? `
    <div class="site-selector-bar">
      <span class="site-selector-label">Site</span>
      <select class="site-select" onchange="changeSite(this.value)">
        ${sites.map(s => `<option value="${s.id}" ${s.id===selectedSiteId?'selected':''}>${s.domain||s.name||s.id}</option>`).join('')}
      </select>
      <button class="btn-crawl" onclick="triggerCrawl()">↻ Relancer le crawl</button>
    </div>` : '';

  const renders = { overview, sites: sitesPage, audit, mystery, suggestions, analytics, pages: pagesSection, config, snippet };
  main.innerHTML = siteSelector + (renders[section] ? renders[section](site) : '<div class="empty">Section en cours de développement.</div>');
}

async function triggerCrawl() {
  if (!selectedSiteId) return;
  await fetchAPI(`/api/pages/crawl`, { method: 'POST', body: JSON.stringify({ site_id: selectedSiteId }) });
  alert('Crawl lancé ! Revenez dans quelques minutes.');
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────

function overview(site) {
  const totalSearches = siteAnalytics?.total_searches || siteAnalytics?.searches?.length || 0;
  const totalPages = sitePages.length;
  const domains = sites.length;

  return `
    <div class="page-tag">Vue générale</div>
    <div class="page-title">Tableau de bord</div>
    <div class="page-sub">Vue d'ensemble de votre activité SEEKR.</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Sites actifs</div>
        <div class="stat-val">${domains}</div>
        <div class="stat-delta neu">Sur votre plan</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pages indexées</div>
        <div class="stat-val">${totalPages}</div>
        <div class="stat-delta up">↑ Indexées et prêtes</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Recherches totales</div>
        <div class="stat-val">${totalSearches.toLocaleString()}</div>
        <div class="stat-delta up">↑ Depuis l'activation</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Plan actuel</div>
        <div class="stat-val" style="font-size:20px;text-transform:capitalize">${currentUser?.plan || '—'}</div>
        <div class="stat-delta neu">Actif</div>
      </div>
    </div>
    ${site ? `
    <div class="section-card">
      <div class="section-head"><span class="section-head-title">Site sélectionné</span></div>
      <table>
        <tr><td style="color:var(--text-muted);width:180px">Domaine</td><td style="font-family:monospace">${site.domain || '—'}</td></tr>
        <tr><td style="color:var(--text-muted)">Clé API</td><td><span style="font-family:monospace;font-size:11px">${site.api_key || '—'}</span></td></tr>
        <tr><td style="color:var(--text-muted)">Statut</td><td><span class="status-dot ok"></span>Actif</td></tr>
        <tr><td style="color:var(--text-muted)">Pages crawlées</td><td>${totalPages}</td></tr>
      </table>
    </div>` : '<div class="empty">Aucun site configuré. Ajoutez-en un dans "Mes sites".</div>'}
  `;
}

// ── SITES ─────────────────────────────────────────────────────────────────────

function sitesPage() {
  if (sites.length === 0) return `<div class="empty">Aucun site. Contactez le support pour en ajouter un.</div>`;
  return `
    <div class="page-tag">Mes sites</div>
    <div class="page-title">Sites configurés</div>
    <div class="page-sub">Gérez vos sites et leurs clés API.</div>
    <div class="section-card">
      <table>
        <thead><tr><th>Domaine</th><th>Plan</th><th>Clé API</th><th>Pages</th><th>Statut</th></tr></thead>
        <tbody>
          ${sites.map(s => `<tr>

            <td><span class="status-dot ok"></span>Actif</td>
          </tr>`).join('')}

      </table>

}

// ── AUDIT SEO ─────────────────────────────────────────────────────────────────

function auditScore(page) {
  let score = 70;
  if (page.title && page.title.length > 10) score += 5;
  if (page.meta_description) score += 5;
  if (page.h1) score += 5;
  if (page.word_count >= 550 && page.word_count <= 600) score += 10;
  else if (page.word_count > 300) score += 5;
  return Math.min(score, 100);
}

function scoreBadgeClass(s) { return s >= 80 ? 'good' : s >= 60 ? 'mid' : 'bad'; }

function audit(site) {
  if (sitePages.length === 0) return `<div class="empty">Aucune page indexée. Lancez un crawl depuis le sélecteur de site.</div>`;
  return `
    <div class="page-tag">Audit SEO</div>
    <div class="page-title">Analyse des pages</div>
    <div class="page-sub">Score SEO on-page pour chaque page indexée.</div>
    <div class="section-card">
      <table>
        <thead><tr><th>Page</th><th>Score</th><th>Mots</th><th>H1</th><th>Meta</th><th>Statut</th></tr></thead>
        <tbody>
          ${sitePages.map(p => {
            const s = auditScore(p);
            const url = p.url || p.path || '—';
            const shortUrl = url.replace(/^https?:\/\/[^/]+/, '') || '/';
            const words = p.word_count || '?';
            const hasH1 = p.h1 ? '✓' : '✗';
            const hasMeta = p.meta_description ? '✓' : '✗';
            return `<tr>
              <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${url}">${shortUrl}</td>
              <td><div class="score-badge ${scoreBadgeClass(s)}">${s}</div></td>
              <td style="color:${words>=550&&words<=600?'var(--green)':'var(--text-muted)'}">${words}</td>
              <td style="color:${hasH1==='✓'?'var(--green)':'var(--red)'}">${hasH1}</td>
              <td style="color:${hasMeta==='✓'?'var(--green)':'var(--red)'}">${hasMeta}</td>
              <td><span class="badge ${s>=80?'green':s>=60?'gold':'red'}">${s>=80?'Optimal':s>=60?'À améliorer':'Critique'}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── MOTS MYSTÈRES ─────────────────────────────────────────────────────────────

function mystery(site) {
  if (sitePages.length === 0) return `<div class="empty">Aucune page indexée.</div>`;

  const good = sitePages.filter(p => p.mystery_word || p.keyword).slice(0, 8);
  const missing = sitePages.filter(p => !p.mystery_word && !p.keyword).slice(0, 6);

  return `
    <div class="page-tag">Mots mystères</div>
    <div class="page-title">Analyse des mots-clés principaux</div>
    <div class="page-sub">Le mot mystère doit apparaître dans les 300 premiers mots avec une densité de 0.8%–1.5%.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="section-card">
        <div class="section-head"><span class="section-head-title" style="color:var(--green)">✓ Bien positionnés</span></div>
        <div style="padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px">
          ${good.length > 0
            ? good.map(p => `<span style="background:rgba(74,222,128,0.1);color:var(--green);padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600">${p.mystery_word || p.keyword || p.title?.split(' ')[0] || '—'}</span>`).join('')
            : '<span style="color:var(--text-muted);font-size:13px">Aucun mot mystère détecté — lancez un crawl.</span>'}
        </div>
      </div>
      <div class="section-card">
        <div class="section-head"><span class="section-head-title" style="color:var(--red)">✗ Hors zone ou manquants</span></div>
        <div style="padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px">
          ${missing.length > 0
            ? missing.map(p => `<span style="background:rgba(248,113,113,0.1);color:var(--red);padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600">${p.title?.split(' ').slice(0,2).join(' ') || p.url?.split('/').filter(Boolean).pop() || '—'}</span>`).join('')
            : '<span style="color:var(--text-muted);font-size:13px">Toutes les pages ont leur mot mystère détecté.</span>'}
        </div>
      </div>
    </div>
    <div class="section-card" style="margin-top:20px">
      <table>
        <thead><tr><th>Page</th><th>Mot mystère</th><th>Densité</th><th>Dans les 300 premiers mots</th></tr></thead>
        <tbody>
          ${sitePages.slice(0, 15).map(p => {
            const kw = p.mystery_word || p.keyword || '—';
            const density = p.keyword_density ? (p.keyword_density * 100).toFixed(1) + '%' : '—';
            const inZone = p.mystery_in_zone !== undefined ? (p.mystery_in_zone ? '<span style="color:var(--green)">✓ Oui</span>' : '<span style="color:var(--red)">✗ Non</span>') : '—';
            const url = (p.url || p.path || '').replace(/^https?:\/\/[^/]+/, '') || '/';
            return `<tr>
              <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${url}</td>
              <td style="font-weight:600;color:var(--gold)">${kw}</td>
              <td>${density}</td>
              <td>${inZone}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}
